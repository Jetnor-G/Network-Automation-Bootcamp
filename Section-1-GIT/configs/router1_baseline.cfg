! Router-1 Baseline Configuration
! Device: R1 | Role: Core Router | OS: NX-OS (virtual Nexus)
! Last updated: 2026-07-14 | Managed by Git
!
hostname Router-1
!
! ── Features ─────────────────────────────────────────────────────────────────
feature ospf
feature ssh
!
! ── Domain ───────────────────────────────────────────────────────────────────
ip domain-name lab.example.com
!
! ── DNS ──────────────────────────────────────────────────────────────────────
ip name-server 8.8.8.8
ip name-server 8.8.4.4
!
! ── NTP ──────────────────────────────────────────────────────────────────────
ntp server 216.239.35.0 prefer
ntp server 216.239.35.4
!
! ── Logging ──────────────────────────────────────────────────────────────────
logging timestamp milliseconds
no logging console
logging logfile messages 6 size 16384
logging server 10.106.106.60 6
!
! ── Banner MOTD ──────────────────────────────────────────────────────────────
banner motd ^
******************************************************************
*   AUTHORIZED ACCESS ONLY — Network Automation Bootcamp Lab     *
*   Unauthorized access is strictly prohibited and monitored.    *
*   All activities are logged.                                   *
******************************************************************
^
!
! ── Authentication ───────────────────────────────────────────────────────────
username admin password Lab@1234 role network-admin
!
! ── Interfaces ───────────────────────────────────────────────────────────────
interface Ethernet1/1
 description WAN_UPLINK
 no switchport
 ip address 203.0.113.1/30
 no shutdown
!
interface Ethernet1/2
 description LAN_SEGMENT
 no switchport
 ip address 10.106.106.61/24
 ip router ospf 1 area 0
 no shutdown
!
! ── Routing ───────────────────────────────────────────────────────────────────
router ospf 1
!
! ── Management ───────────────────────────────────────────────────────────────
line vty
 exec-timeout 10
!
end
