! Router-1 Baseline Configuration
! Device: R1 | Role: Core Router | OS: IOS-XE
! Last updated: 2026-05-18 | Managed by Git
!
version 17.6
!
hostname Router-1
!
! ── Domain ───────────────────────────────────────────────────────────────────
ip domain-name lab.example.com
!
! ── DNS ──────────────────────────────────────────────────────────────────────
ip name-server 8.8.8.8
ip name-server 8.8.4.4
!
! ── NTP ──────────────────────────────────────────────────────────────────────
ntp server 216.239.35.0 prefer
ntp server 216.239.35.4
ntp update-calendar
!
! ── Logging ──────────────────────────────────────────────────────────────────
service timestamps log datetime msec localtime show-timezone year
service timestamps debug datetime msec localtime show-timezone year
no logging console
logging buffered 16384 informational
logging host 10.106.106.60
logging trap informational
!
! ── Banner MOTD ──────────────────────────────────────────────────────────────
banner motd ^
******************************************************************
*   AUTHORIZED ACCESS ONLY — Network Automation Bootcamp Lab     *
*   Unauthorized access is strictly prohibited and monitored.    *
*   All activities are logged.                                   *
******************************************************************
^
!
! ── Authentication ───────────────────────────────────────────────────────────
username admin privilege 15 secret 0 Lab@1234
!
ip routing
!
! ── Interfaces ───────────────────────────────────────────────────────────────
interface GigabitEthernet0/0
 description WAN_UPLINK
 ip address 203.0.113.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description LAN_SEGMENT
 ip address 10.106.106.61 255.255.255.0
 no shutdown
!
! ── Routing ───────────────────────────────────────────────────────────────────
router ospf 1
 network 10.106.106.0 0.0.0.255 area 0
!
! ── Management ───────────────────────────────────────────────────────────────
ip ssh version 2
line vty 0 4
 transport input ssh
 login local
 exec-timeout 10 0
!
end
