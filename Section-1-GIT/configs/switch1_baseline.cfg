! Switch-1 Baseline Configuration
! Device: SW1 | Role: Access Switch | OS: IOS
! Last updated: 2026-05-18 | Managed by Git
!
hostname Switch-1
!
ip domain-name lab.example.com
!
username admin privilege 15 secret 0 Lab@1234
!
vlan 10
 name SERVERS
vlan 20
 name WORKSTATIONS
vlan 99
 name MANAGEMENT
!
interface GigabitEthernet0/1
 description UPLINK_TO_ROUTER1
 switchport mode trunk
 switchport trunk allowed vlan 10,20,99
 no shutdown
!
interface GigabitEthernet0/2
 description SERVER_PORT
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 no shutdown
!
interface Vlan99
 description MANAGEMENT
 ip address 10.0.0.10 255.255.255.0
 ip default-gateway 10.0.0.1
 no shutdown
!
ip ssh version 2
line vty 0 4
 transport input ssh
 login local
!
end
