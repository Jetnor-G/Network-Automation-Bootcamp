! Switch-1 Baseline Configuration
! Device: SW1 | Role: Access Switch | OS: IOS
! Last updated: 2026-05-18 | Managed by Git
!
hostname Switch-1
!
! ── Domain ───────────────────────────────────────────────────────────────────
ip domain-name lab.example.com
!
! ── DNS ──────────────────────────────────────────────────────────────────────
ip name-server 8.8.8.8
ip name-server 8.8.4.4
!
! ── NTP ──────────────────────────────────────────────────────────────────────
ntp server 216.239.35.0 prefer
ntp server 216.239.35.4
ntp update-calendar
!
! ── Logging ──────────────────────────────────────────────────────────────────
service timestamps log datetime msec localtime show-timezone year
service timestamps debug datetime msec localtime show-timezone year
no logging console
logging buffered 16384 informational
logging host 10.0.0.50
logging trap informational
!
! ── Banner MOTD ──────────────────────────────────────────────────────────────
banner motd ^
******************************************************************
*   AUTHORIZED ACCESS ONLY — Network Automation Bootcamp Lab     *
*   Unauthorized access is strictly prohibited and monitored.    *
*   All activities are logged.                                   *
******************************************************************
^
!
! ── Authentication ───────────────────────────────────────────────────────────
username admin privilege 15 secret 0 Lab@1234
!
! ── VLANs ────────────────────────────────────────────────────────────────────
vlan 10
 name SERVERS
vlan 20
 name WORKSTATIONS
vlan 99
 name MANAGEMENT
!
! ── Interfaces ───────────────────────────────────────────────────────────────
interface GigabitEthernet0/1
 description UPLINK_TO_ROUTER1
 switchport mode trunk
 switchport trunk allowed vlan 10,20,99
 no shutdown
!
interface GigabitEthernet0/2
 description SERVER_PORT
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 no shutdown
!
interface Vlan99
 description MANAGEMENT
 ip address 10.0.1.10 255.255.255.0
 no shutdown
!
ip default-gateway 10.0.1.1
!
! ── Management ───────────────────────────────────────────────────────────────
ip ssh version 2
line vty 0 4
 transport input ssh
 login local
 exec-timeout 10 0
!
end
