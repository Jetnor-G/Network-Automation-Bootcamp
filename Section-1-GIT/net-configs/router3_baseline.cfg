! Router-3 Baseline Configuration
! Device: R3 | Role: Core Router | OS: IOS-XE
! Last updated: 2026-05-18 | Managed by Git
!
hostname Router-3
!
ip domain-name lab.example.com
ip routing
!
username admin privilege 15 secret 0 Lab@1234
!
interface GigabitEthernet0/0
 description WAN_UPLINK
 ip address 203.0.113.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description LAN_SEGMENT
 ip address 10.0.0.1 255.255.255.0
 no shutdown
!
router ospf 1
 network 10.0.0.0 0.0.0.255 area 0
 network 203.0.113.0 0.0.0.3 area 0
!
ip ssh version 2
line vty 0 4
 transport input ssh
 login local
!
ntp server 216.239.35.0
!
end
interface Loopback0

 ip address 10.255.255.1 255.255.255.255

 no shutdown
