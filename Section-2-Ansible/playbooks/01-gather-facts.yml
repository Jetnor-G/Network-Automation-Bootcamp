---
# Playbook 1: Gather facts from all network devices
# Run: ansible-playbook -i inventory/hosts.ini playbooks/01-gather-facts.yml

- name: Gather Network Device Facts
  hosts: network
  gather_facts: false

  tasks:
    - name: Gather NX-OS facts (Router-1, Router-2)
      cisco.nxos.nxos_facts:
        gather_subset:
          - hardware
          - interfaces
          - config
      register: nxos_facts_out
      when: inventory_hostname in groups['routers']

    - name: Gather IOS facts (Switch-1)
      cisco.ios.ios_facts:
        gather_subset:
          - hardware
          - interfaces
          - config
      register: ios_facts_out
      when: inventory_hostname in groups['switches']

    - name: Display hostname and version
      debug:
        msg:
          - "Hostname  : {{ ansible_net_hostname }}"
          - "OS Version: {{ ansible_net_version }}"
          - "Serial    : {{ ansible_net_serialnum }}"
          - "Model     : {{ ansible_net_model }}"

    - name: Save facts to file
      copy:
        content: "{{ (nxos_facts_out if inventory_hostname in groups['routers'] else ios_facts_out) | to_nice_yaml }}"
        dest: "./facts/{{ inventory_hostname }}_facts.yml"
      delegate_to: localhost
