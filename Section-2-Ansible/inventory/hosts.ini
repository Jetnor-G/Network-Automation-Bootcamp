[routers]
router1 ansible_host=10.106.106.61
router2 ansible_host=10.106.106.62

[switches]
switch1 ansible_host=10.106.106.63

[network:children]
routers
switches

[network:vars]
ansible_user=admin
ansible_password=Lab@1234
ansible_connection=network_cli
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# Router-1 / Router-2 are virtual Nexus (NX-OS) — vty login lands in full
# EXEC mode already, so no enable/become is needed.
[routers:vars]
ansible_network_os=nxos
ansible_become=no

# Switch-1 is virtual IOS and still needs enable mode.
[switches:vars]
ansible_network_os=ios
ansible_become=yes
ansible_become_method=enable
